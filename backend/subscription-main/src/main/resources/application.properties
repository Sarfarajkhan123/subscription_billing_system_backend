spring.application.name=subscription-billing-system

spring.datasource.url=jdbc:mysql://localhost:3306/subscription_billing_db
spring.datasource.username=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update


spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

server.port=8083
spring.jackson.serialization.fail-on-empty-beans=false

# Surface exception messages (e.g. the 409 "cannot record usage for cancelled
# subscription" reason) in error responses so the frontend can display them.
server.error.include-message=always

# JWT Configuration
jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
jwt.expiration=86400000

# Razorpay (Test Mode). The SECRET is backend-only and is never sent to the
# frontend; only the public key id is exposed via the order-create response.
# Both can be overridden by environment variables in deployment.
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_TD1qxUoZkGiHqo}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:0rJ8y16Cr11RDhWNE4peqH63}
